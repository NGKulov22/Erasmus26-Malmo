{% extends "base.html" %}

{% block title %}Log In | Malmo Connect{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='pages.css') }}">
{% endblock %}

{% block content %}
<section class="page-wrap">
    <div class="page-card" style="max-width: 560px; margin: 0 auto;">
        <div class="page-head">
            <h1 class="page-title">Welcome Back</h1>
            <p class="page-subtitle">Log in to access your profile and saved places.</p>
        </div>

        <form method="post" class="stack-form">
            <input type="hidden" name="next" value="{{ next_page or '' }}">

            <div class="input-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required>
            </div>

            <button type="submit" class="primary-btn">Log In</button>
        </form>

        <p class="link-line">
            No account yet?
            <a href="{{ url_for('auth_bp.register') }}">Create one</a>
        </p>
    </div>
</section>
{% endblock %}
